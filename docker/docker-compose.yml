version: "3.8"

services:
  postgres:
    image: postgres:17
    container_name: postgres-db
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        HOVERCODE_WORKSPACE_ID: ${HOVERCODE_WORKSPACE_ID}
        HOVERCODE_API_KEY: ${HOVERCODE_API_KEY}
        HOVERCODE_BASE_URL: ${HOVERCODE_BASE_URL}
        DATABASE_URL: ${DATABASE_URL}
    container_name: qr-code-generator-app
    env_file:
      - ../.env
    environment:
      HOVERCODE_WORKSPACE_ID: ${HOVERCODE_WORKSPACE_ID}
      HOVERCODE_API_KEY: ${HOVERCODE_API_KEY}
      HOVERCODE_BASE_URL: ${HOVERCODE_BASE_URL}
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
